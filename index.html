<!DOCTYPE html>

  <style>
    /* 黒すぎない、深みのある柔らかい紺色背景 */
    body { background-color: #0f172a; } 
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    
    /* 透過感をもたせて印象を柔らかく */
    .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px); }
    .part-btn, .stat-btn { transition: all 0.2s ease; }
  </style>
</head>
<body class="text-slate-200 min-h-screen font-sans antialiased selection:bg-blue-500/30">

  <header class="py-2 px-4 border-b border-slate-800 glass sticky top-0 z-50">
    <div class="max-w-xl mx-auto flex items-center justify-between">
      <h1 class="text-sm font-bold text-amber-400 tracking-tighter flex items-center gap-1.5">
        <span>💎</span> 素材逆引き検索
      </h1>
      <div id="result-count" class="text-[9px] font-black text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded bg-blue-500/10">
        Ready
      </div>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-3 py-3 space-y-3">

    <section class="glass border border-slate-800 rounded-xl p-2 shadow-sm">
      <div class="grid grid-cols-4 gap-1.5">
        <button id="btn-weapon" onclick="selectPart('weapon')" class="part-btn bg-slate-800/60 hover:bg-slate-700 text-[11px] font-bold py-1.5 rounded-lg border border-slate-700/40">⚔️ 武器</button>
        <button id="btn-armor" onclick="selectPart('armor')" class="part-btn bg-slate-800/60 hover:bg-slate-700 text-[11px] font-bold py-1.5 rounded-lg border border-slate-700/40">🛡️ 防具</button>

      </div>
    </section>

    <section id="stat-section" class="glass border border-slate-800 rounded-xl p-3 shadow-sm hidden">

      </div>
    </section>

    <section id="result-section" class="bg-slate-900/90 border border-slate-800 rounded-xl shadow-2xl hidden overflow-hidden">

        <table class="w-full text-left border-collapse">

              <th class="py-2 px-2 text-center">部位</th>

            </tr>
          </thead>
          <tbody id="result-tbody" class="divide-y divide-slate-800/40">
          </tbody>
        </table>
      </div>
    </section>

      {"Material Name":"エーテルジェム","Rarity":"コズミック","Type":"装飾","Weapon Effect 1 Stat":"マルチストライク","Weapon Effect 1 Min":1, "Weapon Effect 1 Max":"", "Weapon Effect 2 Stat":"", "Weapon Effect 2 Min":"", "Weapon Effect 2 Max":"", "Armor Effect 1 Stat":"ダメージ軽減", "Armor Effect 1 Min":"14%", "Armor Effect 1 Max":"16%", "Armor Effect 2 Stat":"", "Armor Effect 2 Min":"", "Armor Effect 2 Max":"", "Accessory Effect 1 Stat":"基本攻撃要求減少", "Accessory Effect 1 Min":1, "Accessory Effect 1 Max":"", "Accessory Effect 2 Stat":"", "Accessory Effect 2 Min":"", "Accessory Effect 2 Max":""},
      {"Material Name":"混沌のダイヤモンド","Rarity":"コズミック","Type":"装飾","Weapon Effect 1 Stat":"投射物数", "Weapon Effect 1 Min":1, "Weapon Effect 1 Max":"", "Weapon Effect 2 Stat":"", "Weapon Effect 2 Min":"", "Weapon Effect 2 Max":"", "Armor Effect 1 Stat":"全属性耐性", "Armor Effect 1 Min":"25%", "Armor Effect 1 Max":"30%", "Armor Effect 2 Stat":"", "Armor Effect 2 Min":"", "Armor Effect 2 Max":"", "Accessory Effect 1 Stat":"クリティカルダメージ", "Accessory Effect 1 Min":"100%", "Accessory Effect 1 Max":"150%", "Accessory Effect 2 Stat":"", "Accessory Effect 2 Min":"", "Accessory Effect 2 Max":""},
      {"Material Name":"チャソダイス","Rarity":"コズミック","Type":"彫刻","Weapon Effect 1 Stat":"クリティカル率", "Weapon Effect 1 Min":"2.5％", "Weapon Effect 1 Max":"3%", "Weapon Effect 2 Stat":"攻撃力", "Weapon Effect 2 Min":150, "Weapon Effect 2 Max":300, "Armor Effect 1 Stat":"最大HP", "Armor Effect 1 Min":270, "Armor Effect 1 Max":300, "Armor Effect 2 Stat":"ダメージ吸収", "Armor Effect 2 Min":60, "Armor Effect 2 Max":80, "Accessory Effect 1 Stat":"詠唱速度", "Accessory Effect 1 Min":"40%", "Accessory Effect 1 Max":"50%", "Accessory Effect 2 Stat":"攻撃力", "Accessory Effect 2 Min":150, "Accessory Effect 2 Max":300},
      {"Material Name":"ヴォイドの触手","Rarity":"コズミック","Type":"彫刻","Weapon Effect 1 Stat":"攻撃力", "Weapon Effect 1 Min":"100%", "Weapon Effect 1 Max":"150%", "Weapon Effect 2 Stat":"クリティカルダメージ", "Weapon Effect 2 Min":"100%", "Weapon Effect 2 Max":"150%", "Armor Effect 1 Stat":"火炎耐性", "Armor Effect 1 Min":"50%", "Armor Effect 1 Max":"55%", "Armor Effect 2 Stat":"クールダウン短縮", "Armor Effect 2 Min":"14.5％", "Armor Effect 2 Max":"16%", "Accessory Effect 1 Stat":"最大HP", "Accessory Effect 1 Min":270, "Accessory Effect 1 Max":300, "Accessory Effect 2 Stat":"クリティカル率", "Accessory Effect 2 Min":"55%", "Accessory Effect 2 Max":"60%"}
    ];

    let currentPart = null;
    let currentStat = null;

    // 1. 部位選択処理
    function selectPart(part) {
      currentPart = part;
      currentStat = null;
      
      // 部位ボタンのアクティブ色変更
      document.querySelectorAll('.part-btn').forEach(btn => {
        btn.classList.remove('border-amber-500', 'bg-amber-500/10', 'text-amber-500');
        btn.classList.add('bg-slate-800/60', 'text-slate-200');
      });
      const activeBtn = document.getElementById(`btn-${part}`);
      if (activeBtn) {
        activeBtn.classList.remove('bg-slate-800/60', 'text-slate-200');
        activeBtn.classList.add('border-amber-500', 'bg-amber-500/10', 'text-amber-500');
      }
      
      // 結果表示をリセットして非表示に
      document.getElementById('result-section').classList.add('hidden');
      renderStatOptions(part);
    }

    // 2. カテゴリに分けたステータスボタンの生成
    function renderStatOptions(part) {
      const container = document.getElementById('stat-groups-container');
      container.innerHTML = '';

      let availableStats = [];
      if (part === 'all') {
        availableStats = Object.keys(STAT_MASTER);
      } else {
        availableStats = PART_STATS_POOL[part] || [];
      }

      // グループ初期化
      const grouped = {};
      GROUP_ORDER.forEach(g => grouped[g] = []);
      availableStats.forEach(stat => {
        const groupName = STAT_MASTER[stat] || "特殊";
        if (grouped[groupName]) grouped[groupName].push(stat);
      });

      // グループごとにボタンをHTML生成
      GROUP_ORDER.forEach(groupName => {
        const statsInGroup = grouped[groupName];
        if (statsInGroup.length === 0) return;

        const groupDiv = document.createElement('div');
        groupDiv.className = 'space-y-1';
        
        const heading = document.createElement('h3');
        heading.className = 'text-[9px] font-black text-slate-500 uppercase tracking-widest pl-1';
        heading.innerText = groupName;
        groupDiv.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-1'; // 余白をギュッと狭く
        
        // 五十音順に綺麗に並べ替え
        statsInGroup.sort().forEach(stat => {
          const btn = document.createElement('button');
          // py-1.5 px-2 で極限までボタンの無駄スペースを排除
          btn.className = 'stat-btn bg-slate-800/40 hover:bg-slate-700/60 text-[11px] font-medium py-1 px-2 rounded border border-slate-800/60 text-left truncate';
          btn.innerText = stat;
          btn.onclick = () => selectStat(stat, btn);
          grid.appendChild(btn);
        });

        groupDiv.appendChild(grid);
        container.appendChild(groupDiv);
      });

      document.getElementById('stat-section').classList.remove('hidden');
    }

    // 3. ステータス選択処理
    function selectStat(stat, element) {
      currentStat = stat;
      // オレンジ色をアクセントに選択状態を示す
      document.querySelectorAll('.stat-btn').forEach(btn => btn.classList.remove('border-orange-500', 'bg-orange-500/10', 'text-orange-500'));
      element.classList.add('border-orange-500', 'bg-orange-500/10', 'text-orange-500');
      executeSearch();
    }

    // 4. データ検索とテーブル反映
    function executeSearch() {
      if (!currentPart || !currentStat) return;
      
      const tbody = document.getElementById('result-tbody');
      tbody.innerHTML = '';

      const checkTargets = [];
      if (currentPart === 'all') {
        checkTargets.push({ part: '武器', prefix: 'Weapon' });
        checkTargets.push({ part: '防具', prefix: 'Armor' });
        checkTargets.push({ part: 'アクセ', prefix: 'Accessory' });
      } else {
        const labelMap = { weapon: '武器', armor: '防具', accessory: '装飾' };
        checkTargets.push({ part: labelMap[currentPart], prefix: currentPart.charAt(0).toUpperCase() + currentPart.slice(1) });
      }

      let matchCount = 0;

      MATERIAL_DATA.forEach(material => {
        checkTargets.forEach(target => {
          const stat1 = material[`${target.prefix} Effect 1 Stat`];
          const stat2 = material[`${target.prefix} Effect 2 Stat`];

          if (stat1 === currentStat || stat2 === currentStat) {
            matchCount++;
            const isSlot1 = stat1 === currentStat;
            const min = material[`${target.prefix} Effect ${isSlot1 ? 1 : 2} Min`];
            const max = material[`${target.prefix} Effect ${isSlot1 ? 1 : 2} Max`];
            
            const rarity = material["Rarity"] || "コモン";
            let rColor = 'text-slate-400';
            if (rarity === 'ビヨンド') rColor = 'text-fuchsia-400 font-bold';
            else if (rarity === 'ディヴァイン') rColor = 'text-yellow-400 font-bold';
            else if (rarity === 'セレスティアル') rColor = 'text-cyan-400 font-bold';
            else if (rarity === 'イモータル') rColor = 'text-red-500 font-bold';
            else if (rarity === 'アルカナ') rColor = 'text-purple-400 font-bold';
            else if (rarity === 'コズミック') rColor = 'text-violet-400 font-bold';
            else if (rarity === 'レジェンダリー') rColor = 'text-amber-600 font-bold';
            else if (rarity === 'レア') rColor = 'text-blue-400';
            else if (rarity === 'アンコモン') rColor = 'text-teal-400';

            // MATERIAL_DATA内の現在のオブジェクトのインデックスを取得し、ID（1〜69）に変換
            const imgId = MATERIAL_DATA.indexOf(material) + 1;
            const imgPath = `images/${imgId}.png`;

            const tr = document.createElement('tr');
            tr.className = 'hover:bg-slate-800/40 transition text-[11px]';
            tr.innerHTML = `
              <td class="py-1.5 px-3 font-bold text-slate-100">
                <div class="flex items-center gap-2">
                  <img src="${imgPath}" alt="${material["Material Name"]}" class="w-5 h-5 object-contain rounded bg-slate-800/50 shadow-inner" onerror="this.style.opacity='0'">
                  <span>${material["Material Name"]}</span>
                </div>
              </td>
              <td class="py-1.5 px-2 text-center ${rColor}">${rarity}</td>
              <td class="py-1.5 px-2 text-center text-[9px] font-bold text-slate-500">${material["Type"] || '装飾'}</td>
              <td class="py-1.5 px-2 text-slate-400 text-center">${target.part}</td>
              <td class="py-1.5 px-3 text-right font-mono text-amber-500 font-bold">${min}${(max ? ' ～ ' + max : '')}</td>
            `;
            tbody.appendChild(tr);
          }
        });
      });

      document.getElementById('result-count').innerText = `${matchCount} MATCHES`;
      document.getElementById('result-section').classList.remove('hidden');
    }
  </script>
